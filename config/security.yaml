# yaml-language-server: $schema=./security.schema.json
mime_magic:
  enabled: true
  prefix_bytes: 3072
  reject_script_uploads: true
  allowed_script_types: {}
  # allowed_script_types:
  #   shell: true
  #   python: true
  allowed_script_extensions: {}
  # allowed_script_extensions:
  #   sh: true
  #   py: true
  allow_file_types: {}
  # allow_file_types:
  #   images: true
  #   pdf: true
  deny_file_types:
    exe: true
  allow_mime_types: {}
  # allow_mime_types:
  #   application/pdf: true
  deny_mime_types:
    application/x-dosexec: true
    application/x-executable: true
    application/x-sharedlib: true
    application/x-msdownload: true
  equivalent_mime_types:
    - [application/xml, text/xml]
    - [image/jpeg, image/pjpeg]
    - [application/gzip, application/x-gzip]
archive_guard:
  enabled: true
  strict: true
  allow_encrypted: false
  max_total_uncompressed_bytes: 536870912
  max_single_entry_bytes: 268435456
  max_compression_ratio: 100
  max_entries: 10000
  max_depth: 3
  max_filename_bytes: 512
  max_inspection_time_ms: 5000
  max_probe_bytes: 67108864
  worker_memory_bytes: 67108864
  decompress_buffer_bytes: 32768
clamav:
  enabled: false
  address: clamav:3310
  scan_timeout_ms: 30000
  stream_chunk_bytes: 131072
upload_deadlines:
  enabled: true
  marker_prefix: .uploading/
  start_timeout: 10s
  finish_timeout: 1m
  cleanup_enabled: true
  cleanup_interval: 1m
  cleanup_mode: server_loop
shared_key:
  # Empty means no default expiry. Startup logs a warning when shared keys are enabled.
  default_ttl: ""
  max_ttl: ""
http_cache:
  mode: private
  max_age: 24h
  s_max_age: ""
  forward_etag: true
  forward_last_modified: true
logging:
  format: text
  level: info
thumbnails:
  enabled: true
  execution_mode: async
  width: 400
  height: 400
  fit: contain
  upscale: false
  lossless_policy: force_avif_reduction
  preferred_format: avif
  object_key_suffix: /thumbnail
  external_webhook_url: ""
  external_timeout: 30s
