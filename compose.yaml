services:
  rustfs:
    image: rustfs/rustfs:latest
    command:
      - /data
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: true
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs-data:/data

  demo-app:
    build:
      context: .
      dockerfile: demo/Dockerfile
    image: streamuploader-demo-app:local
    environment:
      ADDR: :8081
      DEMO_DATA_PATH: /data/files.json
      UPLOAD_BASE_PATH: /api/upload
      DOWNLOAD_MODE: presigned
      DELETE_OBJECTS_ON_DELETE: "true"
      STREAMUPLOADER_PUBLIC_URL: http://localhost:8080
      BACKEND_CONTROL_URL: http://streamuploader:8082
      S3_BUCKET: stream-upload
      S3_ENDPOINT: http://rustfs:9000
      S3_DOWNLOAD_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
      S3_ACCESS_KEY_ID: rustfsadmin
      S3_SECRET_ACCESS_KEY: rustfsadmin
    ports:
      - "8081:8081"
    volumes:
      - demo-data:/data

  streamuploader:
    build:
      context: .
      dockerfile: Dockerfile.streamuploader
    image: streamuploader:local
    depends_on:
      - rustfs
      - demo-app
    restart: on-failure
    environment:
      ADDR: :8080
      BACKEND_ADDR: :8082
      MODE: simple_fronting_reverse_proxy
      PUBLIC_BASE_URL: http://localhost:8080
      UPLOAD_BASE_PATH: /api/upload
      APPLICATION_SERVER_URL: http://demo-app:8081
      ALLOWED_ORIGINS: "*"
      S3_BUCKET: stream-upload
      S3_ENDPOINT: http://rustfs:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
      S3_PUBLIC_READ: "true"
      S3_ACCESS_KEY_ID: rustfsadmin
      S3_SECRET_ACCESS_KEY: rustfsadmin
      ALLOW_FRONTEND_FILE_ACCESS: "true"
      ENABLE_SHARED_KEY: "true"
      SHARED_KEY_BITS: "128"
      MAX_ARCHIVE_FILES: "100"
      MAX_ARCHIVE_BYTES: "1073741824"
    ports:
      - "8080:8080"
      - "8082:8082"

volumes:
  rustfs-data:
  demo-data:
